name: Check compilation and coding style

on:
  push:
    branches-ignore:
      - no-ga/*
  pull_request:
    branches-ignore:
      - no-ga/*

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-DOP-200-STG-2-1-chocolatine-1.git"
  EXECUTABLES: "bin/mysh"

jobs:
  check_compilation_and_coding_style:
    if: > 
      !contains(github.repository, github.env.MIRROR_SSH_URL)

    runs-on: ubuntu-latest

    container:
      image: epitechcontent/epitest-docker

    env:
      CC: epiclang

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run banana check
        run: banana-check-repo || true

      - name: Compile project
        run: make 2>stderr.log; grep "Banana" stderr.log > banana.log || true
        timeout-minutes: 2

      - name: Show coding style errors
        run: |
          if [ -s banana.log ]; then
            while IFS= read -r line; do
              echo "::error::$line"
            done < banana.log
            exit 1
          fi

      - name: Clean project
        run: make clean

      - name: Check executables
        run: |
          for exe in $EXECUTABLES; do
            if [ ! -x "$exe" ]; then
              echo "Executable $exe is missing or not executable"
              exit 1
            fi
          done

  run_tests:
    needs: check_compilation_and_coding_style

    runs-on: ubuntu-latest

    container:
      image: epitechcontent/epitest-docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run unit tests
        run: make tests_run
        timeout-minutes: 2


  push_to_mirror:
    if: github.event_name == 'push'
    needs: run_tests
    runs-on: ubuntu-latest

    container:
      image: epitechcontent/epitest-docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Mirror into Epitech Chocolatine repo
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: 
            ${{ secrets.GIT_SSH_PRIVATE_KEY }}
